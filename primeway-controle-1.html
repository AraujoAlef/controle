<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>PrimeWay · Controle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F7FA;
    --surface:#FFFFFF;
    --surface-alt:#EAF0F5;
    --primary:#146C94;
    --primary-dark:#0C4E6D;
    --primary-light:#DCEBF2;
    --accent:#F2A65A;
    --accent-dark:#D98A3D;
    --danger:#E4572E;
    --danger-light:#FBE4DD;
    --success:#2E8B57;
    --success-light:#DFF1E6;
    --warn:#E0A458;
    --warn-light:#FBEDD9;
    --text:#1C2B33;
    --text-muted:#5B7280;
    --border:#DCE3EA;
    --radius:14px;
    --shadow:0 2px 10px rgba(20,108,148,0.08), 0 1px 2px rgba(20,108,148,0.06);
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-family:'Sora',system-ui,sans-serif;margin:0;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  #app{max-width:1180px;margin:0 auto;padding-bottom:90px;}

  /* HEADER */
  header.topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 20px 12px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-badge{
    width:38px;height:38px;border-radius:11px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:18px;flex-shrink:0;
  }
  .brand-text h1{font-size:17px;color:var(--primary-dark);}
  .brand-text span{font-size:11px;color:var(--text-muted);letter-spacing:.03em;}
  .header-actions{display:flex;gap:8px;}
  .icon-btn{
    width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface);display:flex;align-items:center;justify-content:center;
    font-size:15px;color:var(--text-muted);
  }
  .icon-btn:hover{background:var(--surface-alt);}

  /* NAV desktop */
  nav.tabs{
    display:flex;gap:4px;padding:0 20px 14px;flex-wrap:wrap;
  }
  .tab-btn{
    padding:9px 16px;border-radius:10px;border:none;background:transparent;
    color:var(--text-muted);font-weight:600;font-size:13.5px;
    display:flex;align-items:center;gap:7px;
  }
  .tab-btn.active{background:var(--primary);color:#fff;}
  .tab-btn:not(.active):hover{background:var(--surface-alt);}

  main{padding:0 20px;}
  section.view{display:none;animation:fade .25s ease;}
  section.view.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  /* CARDS / GENERIC */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
  .section-title{display:flex;align-items:center;justify-content:space-between;margin:22px 0 10px;}
  .section-title h2{font-size:15px;color:var(--primary-dark);}
  .section-title h2 .count{
    display:inline-block;margin-left:6px;background:var(--primary-light);color:var(--primary-dark);
    border-radius:999px;padding:1px 8px;font-size:11.5px;font-family:'Inter';
  }
  .muted{color:var(--text-muted);}
  .empty-state{
    padding:26px 16px;text-align:center;color:var(--text-muted);font-size:13.5px;
    border:1.5px dashed var(--border);border-radius:var(--radius);
  }

  /* DASHBOARD STAT GRID */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);}
  .stat-card .label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .stat-card .value{font-family:'Sora';font-size:19px;font-weight:700;color:var(--primary-dark);margin-top:5px;}
  .stat-card.warn .value{color:var(--accent-dark);}
  .stat-card.good .value{color:var(--success);}

  .alert-item{
    display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
    background:var(--surface);border:1px solid var(--border);margin-bottom:8px;box-shadow:var(--shadow);
  }
  .alert-item .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .dot.red{background:var(--danger);} .dot.amber{background:var(--warn);} .dot.green{background:var(--success);} .dot.blue{background:var(--primary);}
  .alert-item .body{flex:1;min-width:0;}
  .alert-item .body .t1{font-weight:600;font-size:13.5px;}
  .alert-item .body .t2{font-size:12px;color:var(--text-muted);margin-top:1px;}
  .alert-item .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .pill.red{background:var(--danger-light);color:var(--danger);}
  .pill.amber{background:var(--warn-light);color:#96661E;}
  .pill.green{background:var(--success-light);color:var(--success);}
  .pill.blue{background:var(--primary-light);color:var(--primary-dark);}

  .quick-actions{display:flex;gap:10px;margin-top:16px;}
  .btn{
    padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    font-weight:600;font-size:13px;color:var(--text);display:inline-flex;align-items:center;gap:6px;
  }
  .btn:hover{background:var(--surface-alt);}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
  .btn.primary:hover{background:var(--primary-dark);}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--primary-dark);}
  .btn.sm{padding:6px 11px;font-size:12px;}
  .btn.danger{color:var(--danger);border-color:var(--danger-light);}

  /* CLIENTES / KANBAN */
  .toolbar{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap;}
  .search-box{
    flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);font-size:13px;
  }
  .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px;}
  .kcol{background:var(--surface-alt);border-radius:var(--radius);padding:10px;min-height:120px;}
  .kcol-head{display:flex;align-items:center;justify-content:space-between;padding:2px 4px 10px;}
  .kcol-head .name{font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.03em;}
  .kcol-head .count{font-size:11px;background:var(--surface);border-radius:999px;padding:1px 8px;color:var(--text-muted);}
  .kcol[data-status="cotando"] .name{color:#4A6C87;}
  .kcol[data-status="enviado"] .name{color:#96661E;}
  .kcol[data-status="perdido"] .name{color:var(--danger);}
  .kcol[data-status="fechado"] .name{color:var(--success);}
  .kcard{
    background:var(--surface);border-radius:11px;padding:10px 11px;margin-bottom:8px;border:1px solid var(--border);
    box-shadow:var(--shadow);cursor:grab;
  }
  .kcard:active{cursor:grabbing;}
  .kcard .top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
  .kcard .nome{font-weight:700;font-size:13px;}
  .kcard .dest{font-size:12px;color:var(--text-muted);margin-top:2px;}
  .kcard .meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
  .kcard .val{font-size:12px;font-weight:700;color:var(--primary-dark);}
  .kcard .edit{background:none;border:none;color:var(--text-muted);font-size:13px;padding:2px;}
  .kcol.dragover{outline:2px dashed var(--primary);outline-offset:-4px;}

  /* FINANCEIRO */
  .subtabs{display:flex;gap:6px;margin-top:14px;}
  .subtab-btn{padding:7px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:12.5px;font-weight:600;color:var(--text-muted);}
  .subtab-btn.active{background:var(--primary-dark);border-color:var(--primary-dark);color:#fff;}
  table.data{width:100%;border-collapse:collapse;margin-top:12px;font-size:12.5px;}
  table.data th{text-align:left;color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:8px 10px;border-bottom:1px solid var(--border);}
  table.data td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  table.data tr:last-child td{border-bottom:none;}
  .chk{width:17px;height:17px;accent-color:var(--primary);}
  .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;}
  .tag.yes{background:var(--success-light);color:var(--success);}
  .tag.no{background:var(--danger-light);color:var(--danger);}
  .period-select{padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:12.5px;font-weight:600;}

  /* MEI TRACKER */
  .mei-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-top:14px;}
  .mei-head{display:flex;justify-content:space-between;align-items:center;}
  .mei-head h2{font-size:14.5px;color:var(--primary-dark);}
  .mei-nums{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;flex-wrap:wrap;gap:6px;}
  .mei-nums .big{font-family:'Sora';font-size:22px;font-weight:700;color:var(--primary-dark);}
  .mei-nums .of{font-size:12.5px;color:var(--text-muted);}
  .progress-track{height:12px;border-radius:999px;background:var(--surface-alt);margin-top:10px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:999px;background:var(--primary);transition:width .7s cubic-bezier(.22,.61,.36,1);}
  .progress-fill.warn{background:var(--warn);}
  .progress-fill.danger{background:var(--danger);}
  .mei-foot{display:flex;justify-content:space-between;margin-top:8px;font-size:11.5px;color:var(--text-muted);flex-wrap:wrap;gap:6px;}
  .mei-alert{margin-top:10px;padding:9px 11px;border-radius:10px;font-size:12px;font-weight:600;}
  .mei-alert.ok{background:var(--success-light);color:var(--success);}
  .mei-alert.warn{background:var(--warn-light);color:#96661E;}
  .mei-alert.danger{background:var(--danger-light);color:var(--danger);}

  /* CALENDARIO */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
  .cal-legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
  .cal-legend .item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);}
  .cal-legend .sw{width:10px;height:10px;border-radius:3px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:12px;}
  .cal-dow{font-size:10.5px;text-align:center;color:var(--text-muted);font-weight:700;padding-bottom:4px;}
  .cal-cell{
    min-height:76px;border-radius:10px;background:var(--surface);border:1px solid var(--border);
    padding:5px 5px 4px;font-size:11px;position:relative;cursor:pointer;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .cal-cell.other{opacity:.35;}
  .cal-cell.today{border-color:var(--primary);border-width:2px;}
  .cal-cell.tint-green{background:var(--success-light);}
  .cal-cell.tint-amber{background:var(--warn-light);}
  .cal-cell.tint-red{background:var(--danger-light);}
  .cal-top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:3px;}
  .cal-dnum-wrap{display:flex;align-items:center;gap:4px;}
  .cal-cell .dnum{font-weight:700;}
  .cal-alert-dot{
    width:8px;height:8px;border-radius:50%;background:var(--danger);
    box-shadow:0 0 0 2px var(--danger-light);flex-shrink:0;
  }
  .cal-count-badge{
    font-size:9.5px;font-weight:700;background:var(--surface);border:1px solid var(--border);
    border-radius:999px;padding:1px 6px;display:flex;align-items:center;gap:2px;white-space:nowrap;color:var(--text);
  }
  .cal-bars{display:flex;flex-direction:column;gap:2px;margin-top:4px;}
  .cal-bar{height:7px;}
  .cal-bar.rounded-l{border-top-left-radius:5px;border-bottom-left-radius:5px;}
  .cal-bar.rounded-r{border-top-right-radius:5px;border-bottom-right-radius:5px;}
  .cal-bar.green{background:var(--success);}
  .cal-bar.amber{background:var(--warn);}
  .cal-bar.red{background:var(--danger);}
  .cal-more{font-size:9.5px;color:var(--text-muted);font-weight:600;}
  .day-detail{margin-top:14px;}

  /* COTAÇÕES (importação de PDF) */
  .cot-dropzone{
    border:1.5px dashed var(--border);border-radius:var(--radius);padding:26px 16px;text-align:center;
    color:var(--text-muted);font-size:13px;cursor:pointer;background:var(--surface);transition:border-color .15s,background .15s;
    line-height:1.6;
  }
  .cot-dropzone:hover, .cot-dropzone.dragover{border-color:var(--primary);color:var(--primary-dark);background:var(--primary-light);}
  .cot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
  .cot-card .cot-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .cot-id{font-size:10.5px;font-weight:700;color:var(--primary-dark);background:var(--primary-light);padding:2px 9px;border-radius:999px;display:inline-block;}
  .cot-hotel{font-weight:700;font-size:14.5px;margin-top:6px;}
  .cot-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
  .cot-valor{font-family:'Sora';font-weight:700;color:var(--primary-dark);font-size:16px;}
  .cot-link-chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--success-light);color:var(--success);display:inline-flex;align-items:center;gap:5px;}
  .cot-link-chip.unlinked{background:var(--warn-light);color:#96661E;}
  .cot-summary-block{background:var(--surface-alt);border-radius:12px;padding:12px 14px;margin-top:10px;}
  .cot-summary-block h4{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--primary-dark);margin-bottom:8px;}
  .cot-row{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0;gap:10px;}
  .cot-row span:first-child{color:var(--text-muted);flex-shrink:0;}
  .cot-row span:last-child{text-align:right;}
  .cot-flight{font-size:12.5px;padding:8px 0;border-bottom:1px dashed var(--border);}
  .cot-flight:last-child{border-bottom:none;}
  .cot-flight .route{font-weight:700;}
  .cot-loading{display:flex;align-items:center;gap:10px;padding:16px;color:var(--text-muted);font-size:13px;}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:cotspin .7s linear infinite;flex-shrink:0;}
  @keyframes cotspin{to{transform:rotate(360deg);}}

  /* TOAST */
  #toast-stack{
    position:fixed;left:0;right:0;bottom:78px;display:flex;flex-direction:column;align-items:center;gap:8px;
    z-index:200;pointer-events:none;padding:0 16px;
  }
  @media(min-width:760px){ #toast-stack{ bottom:24px; } }
  .toast{
    background:var(--primary-dark);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;
    box-shadow:0 8px 20px rgba(12,78,109,.28);display:flex;align-items:center;gap:8px;max-width:92vw;
    opacity:0;transform:translateY(14px) scale(.96);transition:opacity .25s cubic-bezier(.34,1.56,.64,1),transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .toast.show{opacity:1;transform:translateY(0) scale(1);}
  .toast.success{background:var(--success);}
  .toast.error{background:var(--danger);}
  .toast .ic{font-size:14px;}

  /* CONFIRM DIALOG */
  #confirm-overlay{
    position:fixed;inset:0;background:rgba(15,30,40,0);display:flex;align-items:center;justify-content:center;
    z-index:150;transition:background .18s ease;padding:20px;
  }
  #confirm-overlay.show{background:rgba(15,30,40,.45);}
  #confirm-overlay[hidden]{display:none;}
  #confirm-box{
    background:var(--surface);border-radius:16px;padding:20px;max-width:340px;width:100%;box-shadow:var(--shadow);
    transform:scale(.9) translateY(8px);opacity:0;transition:transform .18s cubic-bezier(.34,1.56,.64,1),opacity .18s ease;
  }
  #confirm-overlay.show #confirm-box{transform:scale(1) translateY(0);opacity:1;}
  #confirm-message{font-size:13.5px;color:var(--text);line-height:1.5;margin:0 0 16px;}
  .confirm-actions{display:flex;justify-content:flex-end;gap:8px;}

  /* TOUCH FEEDBACK */
  .kcard, .cot-card, .alert-item, .stat-card, .btn, .icon-btn{
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .kcard:active, .cot-card:active{ transform:scale(.97); }
  .alert-item:active{ transform:scale(.985); }
  .stat-card:active{ transform:scale(.96); }
  .btn:active, .icon-btn:active{ transform:scale(.94); }
  .kcard.dragging{ transform:rotate(-2deg) scale(1.03); box-shadow:0 10px 24px rgba(20,108,148,.22); opacity:.9; }

  /* MODAL */
  #modal-overlay{
    position:fixed;inset:0;background:rgba(15,30,40,0);display:flex;align-items:flex-end;justify-content:center;
    z-index:100;transition:background .2s ease;
  }
  #modal-overlay.show{background:rgba(15,30,40,.45);}
  #modal-overlay[hidden]{display:none;}
  #modal{
    background:var(--surface);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;
    border-radius:20px 20px 0 0;padding:20px 20px 26px;
    transform:translateY(28px);opacity:0;transition:transform .22s cubic-bezier(.34,1.12,.64,1),opacity .2s ease;
  }
  #modal-overlay.show #modal{transform:translateY(0);opacity:1;}
  @media(min-width:720px){
    #modal-overlay{align-items:center;}
    #modal{border-radius:18px;}
  }
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .modal-head h3{font-size:16px;color:var(--primary-dark);}
  .close-x{background:none;border:none;font-size:20px;color:var(--text-muted);line-height:1;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .form-grid .full{grid-column:1/-1;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--text-muted);margin-bottom:4px;}
  .field input,.field select,.field textarea{
    width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:9px;font-size:13px;background:var(--bg);
  }
  .field textarea{resize:vertical;min-height:54px;}
  .fieldset-label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--primary-dark);margin:16px 0 8px;grid-column:1/-1;padding-top:8px;border-top:1px solid var(--border);}
  .check-row{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:13px;}
  .modal-actions{display:flex;justify-content:space-between;gap:8px;margin-top:18px;}

  /* BOTTOM NAV mobile */
  nav.bottomnav{display:none;}
  @media(max-width:760px){
    nav.tabs{display:none;}
    header.topbar{padding:14px 16px 6px;}
    main{padding:0 14px;}
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    .kanban{grid-template-columns:1fr;gap:16px;}
    .form-grid{grid-template-columns:1fr;}
    nav.bottomnav{
      display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);
      border-top:1px solid var(--border);padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:50;
    }
    .bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text-muted);font-size:9.5px;font-weight:700;padding:6px 2px;border-radius:10px;}
    .bn-btn .ic{font-size:17px;}
    .bn-btn.active{color:var(--primary);background:var(--primary-light);}
  }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="brand">
      <div class="brand-badge">✈️</div>
      <div class="brand-text">
        <h1>PrimeWay Controle</h1>
        <span>Financeiro · Clientes · Viagens</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="syncBtn" title="Sincronização na nuvem" onclick="openSyncModal()">☁️</button>
      <button class="icon-btn" title="Exportar backup" onclick="exportBackup()">⬇️</button>
      <button class="icon-btn" title="Importar backup" onclick="document.getElementById('importFile').click()">⬆️</button>
      <input type="file" id="importFile" accept=".json" hidden onchange="importBackup(event)">
    </div>
  </header>
  <div id="syncStatusBar" style="padding:0 20px 6px;font-size:11px;color:var(--text-muted)"></div>

  <nav class="tabs">
    <button class="tab-btn" data-tab="dashboard" onclick="switchTab('dashboard')">🏠 Painel</button>
    <button class="tab-btn" data-tab="clientes" onclick="switchTab('clientes')">👥 Clientes</button>
    <button class="tab-btn" data-tab="cotacoes" onclick="switchTab('cotacoes')">📄 Cotações</button>
    <button class="tab-btn" data-tab="financeiro" onclick="switchTab('financeiro')">💰 Financeiro</button>
    <button class="tab-btn" data-tab="calendario" onclick="switchTab('calendario')">📅 Calendário</button>
  </nav>

  <main>
    <section id="view-dashboard" class="view"></section>
    <section id="view-clientes" class="view"></section>
    <section id="view-cotacoes" class="view"></section>
    <section id="view-financeiro" class="view"></section>
    <section id="view-calendario" class="view"></section>
  </main>
</div>

<nav class="bottomnav">
  <button class="bn-btn" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="ic">🏠</span>Painel</button>
  <button class="bn-btn" data-tab="clientes" onclick="switchTab('clientes')"><span class="ic">👥</span>Clientes</button>
  <button class="bn-btn" data-tab="cotacoes" onclick="switchTab('cotacoes')"><span class="ic">📄</span>Cotações</button>
  <button class="bn-btn" data-tab="financeiro" onclick="switchTab('financeiro')"><span class="ic">💰</span>Financeiro</button>
  <button class="bn-btn" data-tab="calendario" onclick="switchTab('calendario')"><span class="ic">📅</span>Calendário</button>
</nav>

<div id="modal-overlay" hidden>
  <div id="modal"></div>
</div>

<div id="confirm-overlay" hidden>
  <div id="confirm-box">
    <p id="confirm-message"></p>
    <div class="confirm-actions">
      <button class="btn" id="confirm-cancel-btn">Cancelar</button>
      <button class="btn danger" id="confirm-ok-btn">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast-stack"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<script>
/* ============================================================
   PRIMEWAY CONTROLE — estado + persistência
   ============================================================ */
const STORAGE_KEY = 'primeway_controle_v1';
let state = loadState();
let currentTab = 'dashboard';
let calView = (()=>{ const d=new Date(); return {year:d.getFullYear(), month:d.getMonth()}; })();
let clientFilterText = '';

function defaultState(){ return { clientes: [], gastos: [], cotacoes: [], config: { limiteMeiAnual: 81000 } }; }

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(!parsed.clientes) parsed.clientes = [];
      if(!parsed.gastos) parsed.gastos = [];
      if(!parsed.cotacoes) parsed.cotacoes = [];
      if(!parsed.config) parsed.config = { limiteMeiAnual: 81000 };
      if(!parsed.config.limiteMeiAnual) parsed.config.limiteMeiAnual = 81000;
      return parsed;
    }
  }catch(e){ console.error('Erro ao carregar dados', e); }
  return defaultState();
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ toast('Não foi possível salvar os dados no navegador. Faça um backup manual.', 'error'); }
  scheduleSync();
}
function uid(){ return 'id_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

/* ============================================================
   HELPERS
   ============================================================ */
function todayISO(){
  const d = new Date();
  const local = new Date(d.getTime() - d.getTimezoneOffset()*60000);
  return local.toISOString().slice(0,10);
}
function fmtBRL(n){ return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtData(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function daysDiff(iso){
  if(!iso) return null;
  const a = new Date(todayISO()+'T00:00:00');
  const b = new Date(iso+'T00:00:00');
  return Math.round((b-a)/86400000);
}
function tripStatusInfo(c){
  const pend = Object.values(c.checklist||{}).filter(v=>!v).length;
  const d = daysDiff(c.dataViagemIda);
  let color = 'green';
  if(pend>0) color = (d!==null && d<=2) ? 'red' : 'amber';
  return { pend, color };
}
function newClient(){
  return {
    id: uid(),
    codigoCliente:'',
    nome:'', contato:'', destino:'', operadora:'',
    status:'cotando',
    dataCriacao: todayISO(),
    dataCotacaoEnviada:'', dataFechamento:'',
    dataViagemIda:'', dataViagemVolta:'',
    valorPacote:0, valorComissao:0,
    comissaoRecebida:false, notaFiscalEmitida:false, notaFiscalPaga:false,
    motivoPerda:'',
    checklist:{ hotel:false, checkin:false, docs:false, transfer:false },
    notas:''
  };
}
const STATUS_LABEL = { cotando:'Cotando', enviado:'Cotação Enviada', perdido:'Perdido', fechado:'Fechado' };
const STATUS_ORDER = ['cotando','enviado','perdido','fechado'];
function suggestNextClientCode(){
  let max = 0;
  state.clientes.forEach(c=>{
    const n = parseInt(String(c.codigoCliente||'').replace(/\D/g,''), 10);
    if(!isNaN(n) && n > max) max = n;
  });
  return String(max + 1).padStart(4,'0');
}

/* ============================================================
   TABS
   ============================================================ */
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-btn, .bn-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('section.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  render();
}
function render(){
  if(currentTab==='dashboard') renderDashboard();
  if(currentTab==='clientes') renderClientes();
  if(currentTab==='cotacoes') renderCotacoes();
  if(currentTab==='financeiro') renderFinanceiro();
  if(currentTab==='calendario') renderCalendario();
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDashboard(){
  const el = document.getElementById('view-dashboard');
  const hoje = todayISO();
  const fechados = state.clientes.filter(c=>c.status==='fechado');

  // viagens em andamento
  const emAndamento = fechados.filter(c=> c.dataViagemIda && c.dataViagemIda<=hoje && (!c.dataViagemVolta || c.dataViagemVolta>=hoje));
  // viagens próximas 7 dias
  const proximas = fechados
    .filter(c=> c.dataViagemIda && daysDiff(c.dataViagemIda)!==null && daysDiff(c.dataViagemIda)>=0 && daysDiff(c.dataViagemIda)<=7)
    .sort((a,b)=> a.dataViagemIda.localeCompare(b.dataViagemIda));
  // cotações sem retorno (enviado há mais de 5 dias)
  const cotParadas = state.clientes.filter(c=> c.status==='enviado' && c.dataCotacaoEnviada && daysDiff(c.dataCotacaoEnviada)!==null && daysDiff(c.dataCotacaoEnviada) <= -5);
  // comissões pendentes
  const comissoesPendentes = fechados.filter(c=> !c.comissaoRecebida);
  // notas fiscais pendentes
  const nfPendentes = fechados.filter(c=> !c.notaFiscalEmitida || !c.notaFiscalPaga);

  // stats do mês atual
  const ym = hoje.slice(0,7);
  const faturamentoMes = fechados.filter(c=>(c.dataFechamento||'').startsWith(ym)).reduce((s,c)=>s+Number(c.valorPacote||0),0);
  const comissaoRecebidaMes = fechados.filter(c=>c.comissaoRecebida && (c.dataFechamento||'').startsWith(ym)).reduce((s,c)=>s+Number(c.valorComissao||0),0);
  const gastosMes = state.gastos.filter(g=>(g.data||'').startsWith(ym)).reduce((s,g)=>s+Number(g.valor||0),0);
  const totalLeadsMes = state.clientes.filter(c=>(c.dataCriacao||'').startsWith(ym)).length;
  const fechadosMes = fechados.filter(c=>(c.dataFechamento||'').startsWith(ym)).length;
  const conversao = totalLeadsMes>0 ? Math.round((fechadosMes/totalLeadsMes)*100) : 0;

  function checklistPendencyCount(c){
    return Object.values(c.checklist||{}).filter(v=>!v).length;
  }

  const mei = meiStatus();
  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Faturado no mês</div><div class="value" data-count="${faturamentoMes}" data-currency="1">R$ 0,00</div></div>
      <div class="stat-card good"><div class="label">Comissão recebida</div><div class="value" data-count="${comissaoRecebidaMes}" data-currency="1">R$ 0,00</div></div>
      <div class="stat-card warn"><div class="label">Gastos no mês</div><div class="value" data-count="${gastosMes}" data-currency="1">R$ 0,00</div></div>
      <div class="stat-card"><div class="label">Conversão do mês</div><div class="value" data-count="${conversao}" data-suffix="%">0%</div></div>
    </div>

    ${mei.pct>=80 ? `
    <div class="section-title"><h2>📊 Limite MEI ${mei.year}</h2></div>
    <div class="alert-item">
      <div class="dot ${mei.level==='danger'?'red':'amber'}"></div>
      <div class="body">
        <div class="t1">${fmtBRL(mei.recebidoOficial)} de ${fmtBRL(mei.limite)} (${mei.pct.toFixed(0)}%)</div>
        <div class="t2">${mei.recebidoOficial>mei.limite ? 'Teto anual já ultrapassado — verifique a aba Financeiro' : `Média mensal disponível: ${fmtBRL(mei.mediaNecessaria)}`}</div>
      </div>
      <button class="pill ${mei.level==='danger'?'red':'amber'}" style="border:none" onclick="switchTab('financeiro')">Ver</button>
    </div>` : ''}

    <div class="quick-actions">
      <button class="btn primary" onclick="openClientModal()">+ Novo cliente</button>
      <button class="btn" onclick="switchTab('cotacoes')">+ Importar cotação (PDF)</button>
      <button class="btn" onclick="switchTab('financeiro'); setTimeout(()=>openGastoModal(),50)">+ Novo gasto</button>
    </div>

    <div class="section-title"><h2>🧳 Em viagem agora <span class="count">${emAndamento.length}</span></h2></div>
    ${emAndamento.length===0 ? emptyState('Nenhum cliente em viagem no momento.') : emAndamento.map(c=>`
      <div class="alert-item">
        <div class="dot green"></div>
        <div class="body">
          <div class="t1">${esc(c.nome)} · ${esc(c.destino||'—')}</div>
          <div class="t2">Volta em ${fmtData(c.dataViagemVolta)} · ${checklistPendencyCount(c)>0?`${checklistPendencyCount(c)} pendência(s) de assistência`:'Assistência ok'}</div>
        </div>
        <button class="pill green" style="border:none" onclick="openClientModal('${c.id}')">Ver</button>
      </div>`).join('')}

    <div class="section-title"><h2>📅 Viagens nos próximos 7 dias <span class="count">${proximas.length}</span></h2></div>
    ${proximas.length===0 ? emptyState('Nenhuma viagem começando nos próximos 7 dias.') : proximas.map(c=>{
      const d = daysDiff(c.dataViagemIda);
      const pend = checklistPendencyCount(c);
      return `<div class="alert-item">
        <div class="dot ${pend>0?'amber':'green'}"></div>
        <div class="body">
          <div class="t1">${esc(c.nome)} · ${esc(c.destino||'—')}</div>
          <div class="t2">Embarque em ${fmtData(c.dataViagemIda)} (${d===0?'hoje':d+' dia(s)'}) ${pend>0?`· ${pend} pendência(s)`:'· tudo confirmado'}</div>
        </div>
        <button class="pill ${pend>0?'amber':'green'}" style="border:none" onclick="openClientModal('${c.id}')">Ver</button>
      </div>`;
    }).join('')}

    <div class="section-title"><h2>✉️ Cotações sem retorno <span class="count">${cotParadas.length}</span></h2></div>
    ${cotParadas.length===0 ? emptyState('Nenhuma cotação parada há mais de 5 dias.') : cotParadas.map(c=>`
      <div class="alert-item">
        <div class="dot amber"></div>
        <div class="body">
          <div class="t1">${esc(c.nome)} · ${esc(c.destino||'—')}</div>
          <div class="t2">Enviada em ${fmtData(c.dataCotacaoEnviada)} · sem resposta há ${Math.abs(daysDiff(c.dataCotacaoEnviada))} dias</div>
        </div>
        <button class="pill amber" style="border:none" onclick="openClientModal('${c.id}')">Ver</button>
      </div>`).join('')}

    <div class="section-title"><h2>📄 Cotações aguardando vínculo <span class="count">${state.cotacoes.filter(c=>!c.clienteId).length}</span></h2></div>
    ${state.cotacoes.filter(c=>!c.clienteId).length===0 ? emptyState('Todas as cotações importadas já estão vinculadas a um cliente.') : state.cotacoes.filter(c=>!c.clienteId).slice(0,5).map(c=>`
      <div class="alert-item">
        <div class="dot amber"></div>
        <div class="body">
          <div class="t1">Orçamento ${esc(c.orcamentoId||'—')} · ${esc(c.hospedagemNome||'sem hotel')}</div>
          <div class="t2">${fmtBRL(c.valorTotal)} · importada em ${fmtData(c.dataUpload)}</div>
        </div>
        <button class="pill amber" style="border:none" onclick="switchTab('cotacoes'); setTimeout(()=>openCotacaoReviewModalById('${c.id}'),50)">Vincular</button>
      </div>`).join('')}

    <div class="section-title"><h2>💰 Comissões pendentes <span class="count">${comissoesPendentes.length}</span></h2></div>
    ${comissoesPendentes.length===0 ? emptyState('Nenhuma comissão pendente de recebimento.') : comissoesPendentes.map(c=>`
      <div class="alert-item">
        <div class="dot blue"></div>
        <div class="body">
          <div class="t1">${esc(c.nome)} · ${esc(c.operadora||'—')}</div>
          <div class="t2">Comissão prevista: ${fmtBRL(c.valorComissao)}</div>
        </div>
        <button class="pill blue" style="border:none" onclick="openClientModal('${c.id}')">Ver</button>
      </div>`).join('')}

    <div class="section-title"><h2>🧾 Notas fiscais pendentes <span class="count">${nfPendentes.length}</span></h2></div>
    ${nfPendentes.length===0 ? emptyState('Nenhuma nota fiscal pendente.') : nfPendentes.map(c=>`
      <div class="alert-item">
        <div class="dot red"></div>
        <div class="body">
          <div class="t1">${esc(c.nome)} · ${esc(c.operadora||'—')}</div>
          <div class="t2">${!c.notaFiscalEmitida?'NF não emitida':''} ${!c.notaFiscalEmitida && !c.notaFiscalPaga?'· ':''} ${!c.notaFiscalPaga?'NF não paga':''}</div>
        </div>
        <button class="pill red" style="border:none" onclick="openClientModal('${c.id}')">Ver</button>
      </div>`).join('')}
  `;
  animateStatCards(el);
}
function emptyState(msg){ return `<div class="empty-state">${msg}</div>`; }
function esc(s){ return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ============================================================
   CLIENTES — KANBAN
   ============================================================ */
function renderClientes(){
  const el = document.getElementById('view-clientes');
  el.innerHTML = `
    <div class="toolbar">
      <input class="search-box" placeholder="Buscar por nome ou destino..." value="${esc(clientFilterText)}" oninput="clientFilterText=this.value; renderClientes()">
      <button class="btn primary" onclick="openClientModal()">+ Novo cliente</button>
    </div>
    <div class="kanban">
      ${STATUS_ORDER.map(st=>kanbanColumn(st)).join('')}
    </div>
  `;
}
function kanbanColumn(status){
  const items = state.clientes
    .filter(c=>c.status===status)
    .filter(c=>{
      const q = clientFilterText.toLowerCase();
      if(!q) return true;
      return (c.nome||'').toLowerCase().includes(q) || (c.destino||'').toLowerCase().includes(q);
    })
    .sort((a,b)=> (b.dataCriacao||'').localeCompare(a.dataCriacao||''));
  return `
    <div class="kcol" data-status="${status}" ondragover="event.preventDefault(); this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="onDropCard(event,'${status}')">
      <div class="kcol-head"><span class="name">${STATUS_LABEL[status]}</span><span class="count">${items.length}</span></div>
      ${items.length===0? emptyState('Vazio') : items.map(c=>kanbanCard(c)).join('')}
    </div>
  `;
}
function kanbanCard(c){
  const sub = c.status==='fechado'
    ? `Embarque: ${fmtData(c.dataViagemIda)}`
    : c.status==='perdido'
      ? (c.motivoPerda? esc(c.motivoPerda) : 'Sem motivo registrado')
      : `Criado em ${fmtData(c.dataCriacao)}`;
  return `
    <div class="kcard" draggable="true"
      ondragstart="event.dataTransfer.setData('text/plain','${c.id}'); this.classList.add('dragging')"
      ondragend="this.classList.remove('dragging')">
      <div class="top">
        <div>
          <div class="nome">${c.codigoCliente ? `#${esc(c.codigoCliente)} · `:''}${esc(c.nome||'Sem nome')}</div>
          <div class="dest">${esc(c.destino||'Destino não definido')}</div>
        </div>
        <button class="edit" onclick="event.stopPropagation(); openClientModal('${c.id}')">✏️</button>
      </div>
      <div class="meta">
        <span class="val">${c.status==='fechado'? fmtBRL(c.valorPacote) : sub}</span>
      </div>
    </div>
  `;
}
function onDropCard(ev, newStatus){
  ev.preventDefault();
  ev.currentTarget.classList.remove('dragover');
  const id = ev.dataTransfer.getData('text/plain');
  const c = state.clientes.find(x=>x.id===id);
  if(!c || c.status===newStatus) return;
  c.status = newStatus;
  if(newStatus==='enviado' && !c.dataCotacaoEnviada) c.dataCotacaoEnviada = todayISO();
  if(newStatus==='fechado' && !c.dataFechamento) c.dataFechamento = todayISO();
  saveState();
  renderClientes();
}

/* ---- Modal de cliente ---- */
let editingClient = null;
function openClientModal(id){
  editingClient = id ? JSON.parse(JSON.stringify(state.clientes.find(c=>c.id===id))) : newClient();
  const isNew = !id;
  const c = editingClient;
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-head">
      <h3>${isNew? 'Novo cliente' : 'Editar cliente'}</h3>
      <button class="close-x" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="field"><label>ID do cliente</label><input id="f_codigo" value="${esc(c.codigoCliente || (isNew ? suggestNextClientCode() : ''))}" placeholder="Ex: 0001"></div>
      <div class="field"><label>Nome do cliente</label><input id="f_nome" list="dl_clientes_nome" value="${esc(c.nome)}" placeholder="Nome completo" ${isNew?`oninput="onClientNomeInput(this.value)"`:''}></div>
      <div class="field"><label>Contato (whatsapp/e-mail)</label><input id="f_contato" list="dl_clientes_contato" value="${esc(c.contato)}" ${isNew?`oninput="onClientContatoInput(this.value)"`:''}></div>
      <div class="field"><label>Status</label>
        <select id="f_status">
          ${STATUS_ORDER.map(s=>`<option value="${s}" ${c.status===s?'selected':''}>${STATUS_LABEL[s]}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Destino</label><input id="f_destino" value="${esc(c.destino)}"></div>
      <div class="field"><label>Operadora parceira</label><input id="f_operadora" value="${esc(c.operadora)}"></div>

      <div class="fieldset-label">Viagem</div>
      <div class="field"><label>Data de ida</label><input type="date" id="f_ida" value="${c.dataViagemIda}"></div>
      <div class="field"><label>Data de volta</label><input type="date" id="f_volta" value="${c.dataViagemVolta}"></div>

      <div class="fieldset-label">Financeiro</div>
      <div class="field"><label>Data da cotação enviada</label><input type="date" id="f_datacot" value="${c.dataCotacaoEnviada}"></div>
      <div class="field"><label>Data do fechamento</label><input type="date" id="f_datafechamento" value="${c.dataFechamento}"></div>
      <div class="field"><label>Valor do pacote (faturamento)</label><input type="number" step="0.01" id="f_valorpacote" value="${c.valorPacote}"></div>
      <div class="field"><label>Valor da comissão</label><input type="number" step="0.01" id="f_valorcomissao" value="${c.valorComissao}"></div>
      <div class="field full">
        <div class="check-row"><input type="checkbox" class="chk" id="f_comrecebida" ${c.comissaoRecebida?'checked':''}><label style="margin:0" for="f_comrecebida">Comissão já recebida</label></div>
        <div class="check-row"><input type="checkbox" class="chk" id="f_nfemitida" ${c.notaFiscalEmitida?'checked':''}><label style="margin:0" for="f_nfemitida">Nota fiscal emitida</label></div>
        <div class="check-row"><input type="checkbox" class="chk" id="f_nfpaga" ${c.notaFiscalPaga?'checked':''}><label style="margin:0" for="f_nfpaga">Nota fiscal paga</label></div>
      </div>

      <div class="fieldset-label">Assistência de viagem (checklist)</div>
      <div class="field full">
        <div class="check-row"><input type="checkbox" class="chk" id="f_ck_hotel" ${c.checklist.hotel?'checked':''}><label style="margin:0" for="f_ck_hotel">Reserva de hotel confirmada</label></div>
        <div class="check-row"><input type="checkbox" class="chk" id="f_ck_checkin" ${c.checklist.checkin?'checked':''}><label style="margin:0" for="f_ck_checkin">Check-in online feito</label></div>
        <div class="check-row"><input type="checkbox" class="chk" id="f_ck_docs" ${c.checklist.docs?'checked':''}><label style="margin:0" for="f_ck_docs">Documentação conferida</label></div>
        <div class="check-row"><input type="checkbox" class="chk" id="f_ck_transfer" ${c.checklist.transfer?'checked':''}><label style="margin:0" for="f_ck_transfer">Transfer/traslado confirmado</label></div>
      </div>

      <div class="field full" id="motivoPerdaWrap" style="display:${c.status==='perdido'?'block':'none'}">
        <label>Motivo da perda</label><input id="f_motivoperda" value="${esc(c.motivoPerda)}" placeholder="Ex: preço, escolheu outra agência...">
      </div>
      <div class="field full"><label>Observações</label><textarea id="f_notas">${esc(c.notas)}</textarea></div>

      ${!isNew ? `
      <div class="fieldset-label">📄 Cotações vinculadas</div>
      <div class="field full">
        ${renderClientCotacoesList(c.id)}

    destino: document.getElementById('f_destino').value.trim(),
    operadora: document.getElementById('f_operadora').value.trim(),

    dataCotacaoEnviada: document.getElementById('f_datacot').value,
    dataFechamento: document.getElementById('f_datafechamento').value,
    dataViagemIda: document.getElementById('f_ida').value,
    dataViagemVolta: document.getElementById('f_volta').value,
    valorPacote: parseFloat(document.getElementById('f_valorpacote').value)||0,
    valorComissao: parseFloat(document.getElementById('f_valorcomissao').value)||0,
    comissaoRecebida: document.getElementById('f_comrecebida').checked,
    notaFiscalEmitida: document.getElementById('f_nfemitida').checked,
    notaFiscalPaga: document.getElementById('f_nfpaga').checked,
    motivoPerda: document.getElementById('f_motivoperda') ? document.getElementById('f_motivoperda').value.trim() : '',
    checklist:{

      docs: document.getElementById('f_ck_docs').checked,
      transfer: document.getElementById('f_ck_transfer').checked,
    },
    notas: document.getElementById('f_notas').value.trim()
  };

async function deleteClient(id){

}

/* ---- Histórico de clientes (autocompletar nome/telefone) ---- */
function buildClientHistoryOptions(){
  const byNome = {}; const byContato = {};
  const sorted = [...state.clientes].sort((a,b)=>(a.dataCriacao||'').localeCompare(b.dataCriacao||''));
  sorted.forEach(c=>{
    if(c.nome && c.nome.trim()) byNome[c.nome.trim().toLowerCase()] = { nome:c.nome.trim(), contato:c.contato||'' };
    if(c.contato && c.contato.trim()) byContato[c.contato.trim()] = { nome:c.nome||'', contato:c.contato.trim() };
  });
  return {
    map: byNome, byPhone: byContato,
    names: Object.values(byNome).map(v=>v.nome),
    contatos: Object.values(byContato).map(v=>v.contato)
  };
}

function onClientContatoInput(value){

    nomeField.value = hist.byPhone[key].nome || '';
  }
}

function brValorToNumber(s){
  if(!s) return 0;

  const m = String(d||'').match(/(\d{2})\/(\d{2})\/(\d{4})/);

async function handleCotacaoFile(ev){
  const file = ev.target.files && ev.target.files[0];
  if(ev.target.value !== undefined) ev.target.value = '';
  if(!file) return;
  if(!/pdf$/i.test(file.name) && file.type !== 'application/pdf'){
    toast('Envie um arquivo em PDF.', 'error');
    return;
  }
  showCotLoadingModal(file.name);
  try{
    const buffer = await file.arrayBuffer();
    const text = await extractPdfText(buffer);
    const parsed = parseCotacaoText(text);
    parsed.arquivoNome = file.name;
    closeModal();
    openCotacaoReviewModal(parsed, true);
  }catch(err){
    console.error('Erro ao ler PDF', err);
    closeModal();
    toast('Não consegui ler esse PDF automaticamente. Preencha os dados manualmente.', 'error');
    const blank = newCotacao();
    blank.arquivoNome = file.name;
    openCotacaoReviewModal(blank, true);
  }
}
function showCotLoadingModal(fileName){
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-head"><h3>Lendo cotação...</h3></div>
    <div class="cot-loading"><div class="spinner"></div><span>Extraindo dados de "${esc(fileName)}"...</span></div>
  `;
  showModal();
}
async function extractPdfText(arrayBuffer){
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let fullText = '';
  for(let p=1; p<=pdf.numPages; p++){
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    let lastY = null, line = '';
    for(const item of content.items){
      if(lastY !== null && Math.abs(item.transform[5]-lastY) > 2){
        fullText += line.trim() + '\n';
        line = '';
      }
      line += item.str + ' ';
      lastY = item.transform[5];
    }
    fullText += line.trim() + '\n\n';
  }
  return fullText;
}
function parseCotacaoText(raw){
  const data = newCotacao();
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const get = (re) => { const m = raw.match(re); return m ? m[1].trim() : ''; };

  data.orcamentoId = get(/Or[çc]amento\s*ID:?\s*(\d+)/i);

  const idxAg = lines.findIndex(l => /^AG[ÊE]NCIA:/i.test(l));
  if(idxAg >= 0){
    // a linha pode trazer colunas vizinhas juntas (ex: "AGÊNCIA: X Orçamento ID: 123 ORÇAMENTO 1")
    data.agenciaEmissora = lines[idxAg]
      .replace(/^AG[ÊE]NCIA:\s*/i,'')
      .split(/Or[çc]amento/i)[0]
      .trim();
    for(let i=idxAg+1; i<Math.min(idxAg+6, lines.length); i++){
      const l = lines[i];
      const emMatch = l.match(/[\w.+-]+@[\w-]+\.[\w.-]+/);
      const telMatch = l.match(/\(\d{2}\)\s*\d{4,5}-?\d{4}/);
      if(emMatch && !data.consultorEmail) data.consultorEmail = emMatch[0];
      else if(telMatch && !data.consultorTelefone) data.consultorTelefone = telMatch[0];
      else if(!data.consultor && !emMatch && !telMatch && /^[A-ZÀ-Úa-zà-ú\s\.]+$/.test(l) && l.length>3 && !/ORÇAMENTO|ORCAMENTO|PACOTE/i.test(l)) data.consultor = l;
    }
  }

  const idxHosp = lines.findIndex(l => /^Hospedagem\s*-/i.test(l));
  if(idxHosp>=0){
    data.hospedagemNome = lines[idxHosp].replace(/^Hospedagem\s*-\s*/i,'').trim();
    if(lines[idxHosp+1] && !/★|noites|de\s[A-Za-zç]+\./i.test(lines[idxHosp+1])) data.hospedagemEndereco = lines[idxHosp+1];
    const bloco = lines.slice(idxHosp, idxHosp+6);
    const periodoLine = bloco.find(l => /\d{1,2}\s*de\s*[A-Za-zç]+\.?\s*-\s*\d{1,2}\s*de\s*[A-Za-zç]+\.?/i.test(l));
    if(periodoLine){
      const pm = periodoLine.match(/(\d{1,2}\s*de\s*[A-Za-zç]+\.?\s*-\s*\d{1,2}\s*de\s*[A-Za-zç]+\.?)/i);
      if(pm) data.periodo = pm[1];
      const nm = periodoLine.match(/(\d{1,2})\s*noites?/i);
      if(nm) data.noites = nm[1];
    }
    const regimeLine = bloco.find(l => /caf[eé] da manh|apto|quarto|acomoda/i.test(l));
    if(regimeLine) data.regime = regimeLine;
    const enderecoPartes = (data.hospedagemEndereco||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(enderecoPartes.length){
      data.destino = enderecoPartes[enderecoPartes.length-1]
        .replace(/-?\d{5}-?\d{3}/,'')
        .replace(/\s{2,}/g,' ')
        .trim();
    }
  }

  const adultosMatch = raw.match(/(\d+)\s*Adultos?/i);
  data.adultos = adultosMatch ? adultosMatch[1] : '';

  // O layout dos PDFs varia bastante (colunas podem cair na mesma linha ou em
  // linhas separadas dependendo do gerador do orçamento), então em vez de contar
  // linhas fixas a partir do rótulo "Ida"/"Volta", varremos uma janela de texto
  // até o próximo marcador conhecido e buscamos os padrões (aeroportos, horários,
  // companhia, nº do voo) onde quer que estejam dentro dela.
  function parseFlightBlock(startIdx, endIdx){
    const windowLines = lines.slice(startIdx, endIdx);
    // Processamos linha a linha (em vez de juntar tudo em um texto só) para
    // não deixar uma palavra do fim de uma linha "vazar" para o início da próxima.
    const airportMatches = [];
    const dtMatches = [];
    let vooMatch = null;
    for(const l of windowLines){
      for(const m of l.matchAll(/([A-Za-zÀ-ÿ][A-Za-zÀ-ÿ\.\s]*?)\s*\(([A-Z]{3})\)/g)) airportMatches.push(m);
      for(const m of l.matchAll(/(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})/g)) dtMatches.push(m);
      if(!vooMatch){ const vm2 = l.match(/N[°º]:?\s*(\d+)/); if(vm2) vooMatch = vm2; }
    }
    const ciaLine = windowLines.find(l => /^-\s*[A-Za-zÀ-ÿ]/.test(l));
    return {
      origem: airportMatches[0] ? airportMatches[0][1].trim() : '',
      origemCod: airportMatches[0] ? airportMatches[0][2] : '',
      destino: airportMatches[1] ? airportMatches[1][1].trim() : '',
      destinoCod: airportMatches[1] ? airportMatches[1][2] : '',
      data: dtMatches[0] ? dtMatches[0][1] : '',
      hora: dtMatches[0] ? dtMatches[0][2] : '',
      dataChegada: dtMatches[1] ? dtMatches[1][1] : '',
      horaChegada: dtMatches[1] ? dtMatches[1][2] : '',
      cia: ciaLine ? ciaLine.replace(/^-\s*/,'').trim() : '',
      voo: vooMatch ? vooMatch[1] : ''
    };
  }
  const idxIda = lines.findIndex(l => /^Ida\b/i.test(l));
  const idxVolta = lines.findIndex(l => /^Volta\b/i.test(l));
  const idxTransfer = lines.findIndex(l => /^Transfer\b/i.test(l));
  if(idxIda >= 0){
    const end = idxVolta > idxIda ? idxVolta : Math.min(idxIda+7, lines.length);
    data.aereoIda = parseFlightBlock(idxIda, end);
  }
  if(idxVolta >= 0){
    const end = idxTransfer > idxVolta ? idxTransfer : Math.min(idxVolta+7, lines.length);
    data.aereoVolta = parseFlightBlock(idxVolta, end);
  }

  if(data.aereoIda && data.aereoIda.data) data.dataViagemIda = brDateToISO(data.aereoIda.data);
  if(data.aereoVolta && data.aereoVolta.data) data.dataViagemVolta = brDateToISO(data.aereoVolta.data);
  if(data.aereoIda && data.aereoIda.destino && !data.destino) data.destino = data.aereoIda.destino;

  const idxProdLabel = raw.search(/PRODUTOS:/i);
  if(idxProdLabel >= 0){
    const rest = raw.slice(idxProdLabel);
    const matches = [...rest.matchAll(/R\$\s*([\d\.,]+)/g)].slice(0,3);
    if(matches[0]) data.valorProdutos = brValorToNumber(matches[0][1]);
    if(matches[1]) data.valorTaxas = brValorToNumber(matches[1][1]);
    if(matches[2]) data.valorTotal = brValorToNumber(matches[2][1]);
  }
  if(!data.valorTotal){
    const tm = raw.match(/TOTAL:\s*R\$\s*([\d\.,]+)/i);
    if(tm) data.valorTotal = brValorToNumber(tm[1]);
  }
  return data;
}

function saveCotacaoFromForm(){
  const c = cotacaoEmEdicao;
  c.orcamentoId = document.getElementById('ct_orcid').value.trim();
  c.agenciaEmissora = document.getElementById('ct_agencia').value.trim();
  c.consultor = document.getElementById('ct_consultor').value.trim();
  c.hospedagemNome = document.getElementById('ct_hotel').value.trim();
  c.hospedagemEndereco = document.getElementById('ct_endereco').value.trim();
  c.periodo = document.getElementById('ct_periodo').value.trim();
  c.noites = document.getElementById('ct_noites').value.trim();
  c.regime = document.getElementById('ct_regime').value.trim();
  c.adultos = document.getElementById('ct_adultos').value.trim();
  c.destino = document.getElementById('ct_destino').value.trim();
  c.valorProdutos = parseFloat(document.getElementById('ct_produtos').value)||0;
  c.valorTaxas = parseFloat(document.getElementById('ct_taxas').value)||0;
  c.valorTotal = parseFloat(document.getElementById('ct_total').value)||0;
  c.dataViagemIda = document.getElementById('ct_dataida').value;
  c.dataViagemVolta = document.getElementById('ct_datavolta').value;
  c.observacoes = document.getElementById('ct_obs').value.trim();

  const clienteSel = document.getElementById('ct_cliente').value;
  const idx = state.cotacoes.findIndex(x=>x.id===c.id);
  if(idx>=0) state.cotacoes[idx] = c; else state.cotacoes.push(c);

  let novoClienteId = '';
  if(clienteSel === '__novo__'){
    const novo = newClient();
    novo.nome = c.hospedagemNome ? `Cliente · ${c.hospedagemNome}` : 'Novo cliente';
    novo.destino = c.destino;
    novo.operadora = c.agenciaEmissora;
    novo.dataViagemIda = c.dataViagemIda;
    novo.dataViagemVolta = c.dataViagemVolta;
    novo.valorPacote = c.valorTotal;
    novo.status = 'enviado';
    novo.dataCotacaoEnviada = c.dataUpload || todayISO();
    novo.notas = `Gerado a partir da cotação nº ${c.orcamentoId || '—'} (${c.arquivoNome}). Ajuste o nome do cliente.`;
    novo.codigoCliente = suggestNextClientCode();
    state.clientes.push(novo);
    c.clienteId = novo.id;
    novoClienteId = novo.id;
  } else if(clienteSel){
    c.clienteId = clienteSel;
  } else {
    c.clienteId = '';
  }

  saveState();
  closeModal();
  render();
  toast('Cotação salva.', 'success');
  if(novoClienteId){
    setTimeout(()=> openClientModal(novoClienteId), 150);
  }
}
async function deleteCotacao(id){
  if(!(await askConfirm('Excluir esta cotação importada? Essa ação não pode ser desfeita.'))) return;
  state.cotacoes = state.cotacoes.filter(x=>x.id!==id);
  saveState();
  closeModal();
  render();
  toast('Cotação excluída.', 'success');
}

/* ============================================================
   MODAL genérico
   ============================================================ */
function showModal(){
  const overlay = document.getElementById('modal-overlay');
  overlay.hidden = false;
  requestAnimationFrame(()=> requestAnimationFrame(()=> overlay.classList.add('show')));
}
function closeModal(){
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('show');
  setTimeout(()=>{ overlay.hidden = true; }, 200);
  editingClient=null;
}
document.getElementById('modal-overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

/* ---- Toast (substitui alert() para avisos rápidos) ---- */
function toast(message, type){
  const stack = document.getElementById('toast-stack');
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  const icon = type==='success' ? '✓' : type==='error' ? '⚠️' : 'ℹ️';
  el.innerHTML = `<span class="ic">${icon}</span><span>${esc(message)}</span>`;
  stack.appendChild(el);
  requestAnimationFrame(()=> requestAnimationFrame(()=> el.classList.add('show')));
  setTimeout(()=>{
    el.classList.remove('show');
    setTimeout(()=> el.remove(), 250);
  }, 2600);
}

/* ---- Confirmação customizada (substitui confirm()) ---- */
function askConfirm(message){
  return new Promise(resolve=>{
    const overlay = document.getElementById('confirm-overlay');
    document.getElementById('confirm-message').textContent = message;
    overlay.hidden = false;
    requestAnimationFrame(()=> requestAnimationFrame(()=> overlay.classList.add('show')));
    const okBtn = document.getElementById('confirm-ok-btn');
    const cancelBtn = document.getElementById('confirm-cancel-btn');
    function cleanup(result){
      overlay.classList.remove('show');
      setTimeout(()=>{ overlay.hidden = true; }, 180);
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      resolve(result);
    }
    function onOk(){ cleanup(true); }
    function onCancel(){ cleanup(false); }
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
  });
}

/* ---- Números que sobem ao aparecer (stat cards) ---- */
function animateValue(el, endValue, isCurrency){
  const duration = 650;
  const start = performance.now();
  function frame(now){
    const p = Math.min((now-start)/duration, 1);
    const eased = 1 - Math.pow(1-p, 3);
    const current = endValue * eased;
    el.textContent = isCurrency ? fmtBRL(current) : Math.round(current) + (el.dataset.suffix||'');
    if(p < 1) requestAnimationFrame(frame);
    else el.textContent = isCurrency ? fmtBRL(endValue) : Math.round(endValue) + (el.dataset.suffix||'');
  }
  requestAnimationFrame(frame);
}
function animateStatCards(container){
  container.querySelectorAll('[data-count]').forEach(el=>{
    const end = parseFloat(el.dataset.count) || 0;
    const isCurrency = el.dataset.currency === '1';
    animateValue(el, end, isCurrency);
  });
}
function animateProgressBars(container){
  container.querySelectorAll('.progress-fill[data-target]').forEach(el=>{
    requestAnimationFrame(()=> requestAnimationFrame(()=>{
      el.style.width = el.dataset.target + '%';
    }));
  });
}

/* ============================================================
   CONTROLE MEI (limite anual de faturamento)
   ============================================================ */
function meiStatus(){
  const year = todayISO().slice(0,4);
  const mesAtual = Number(todayISO().slice(5,7)); // 1-12
  const limite = Number(state.config.limiteMeiAnual)||81000;
  const tolerancia = limite*1.2;

  const fechadosAno = state.clientes.filter(c=>c.status==='fechado' && (c.dataFechamento||'').startsWith(year));
  const recebidoOficial = fechadosAno.filter(c=>c.comissaoRecebida).reduce((s,c)=>s+Number(c.valorComissao||0),0);
  const previstoTotal = fechadosAno.reduce((s,c)=>s+Number(c.valorComissao||0),0);
  const naoRecebidoAinda = previstoTotal - recebidoOficial;

  const pct = limite>0 ? (recebidoOficial/limite)*100 : 0;
  const restante = Math.max(limite - recebidoOficial, 0);
  const mesesRestantes = Math.max(12 - mesAtual + 1, 1);
  const mediaNecessaria = restante / mesesRestantes;

  let level = 'ok';
  if(recebidoOficial > limite) level = 'danger';
  else if(recebidoOficial > tolerancia*0 && pct>=80) level = 'warn';
  if(recebidoOficial > tolerancia) level = 'danger';

  return { year, limite, tolerancia, recebidoOficial, previstoTotal, naoRecebidoAinda, pct, restante, mediaNecessaria, level };
}
function renderMeiCard(){
  const m = meiStatus();
  const barPct = Math.min(m.pct, 100);
  const barClass = m.level==='danger' ? 'danger' : m.level==='warn' ? 'warn' : '';
  let alertHtml = '';
  if(m.recebidoOficial > m.tolerancia){
    alertHtml = `<div class="mei-alert danger">Você ultrapassou o limite + 20% de tolerância (${fmtBRL(m.tolerancia)}). Risco de desenquadramento retroativo — vale falar com seu contador o quanto antes.</div>`;
  } else if(m.recebidoOficial > m.limite){
    alertHtml = `<div class="mei-alert warn">Você já passou do teto anual de ${fmtBRL(m.limite)}, mas ainda dentro da tolerância de 20%. Dá pra fechar o ano pagando DAS complementar — bom já se planejar.</div>`;
  } else if(m.pct>=80){
    alertHtml = `<div class="mei-alert warn">Você já usou ${m.pct.toFixed(0)}% do limite anual. Para não estourar, mantenha a média mensal em até ${fmtBRL(m.mediaNecessaria)}.</div>`;
  } else {
    alertHtml = `<div class="mei-alert ok">Dentro do limite. Média mensal disponível pelo resto do ano: ${fmtBRL(m.mediaNecessaria)}.</div>`;
  }
  return `
    <div class="mei-card">
      <div class="mei-head">
        <h2>📊 Limite MEI ${m.year} (base: comissão recebida)</h2>
        <button class="icon-btn" title="Configurar limite" onclick="openMeiConfigModal()">⚙️</button>
      </div>
      <div class="mei-nums">
        <span class="big">${fmtBRL(m.recebidoOficial)}</span>
        <span class="of">de ${fmtBRL(m.limite)} (${m.pct.toFixed(1)}%)</span>
      </div>
      <div class="progress-track"><div class="progress-fill ${barClass}" data-target="${barPct}" style="width:0%"></div></div>
      <div class="mei-foot">
        <span>Previsto ainda a receber: ${fmtBRL(m.naoRecebidoAinda)}</span>
        <span>Tolerância (20%): ${fmtBRL(m.tolerancia)}</span>
      </div>
      ${alertHtml}
    </div>
  `;
}
function openMeiConfigModal(){
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-head"><h3>Configurar limite MEI</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="form-grid">

/* ============================================================
   FINANCEIRO
   ============================================================ */
let finSubtab = 'faturamento';
let finPeriodo = 'mes';
function periodRange(){
  const hoje = todayISO();
  const d = new Date(hoje+'T00:00:00');
  if(finPeriodo==='mes'){
    const ym = hoje.slice(0,7);
    return iso => (iso||'').startsWith(ym);
  }
  if(finPeriodo==='mespassado'){
    const dm = new Date(d.getFullYear(), d.getMonth()-1, 1);
    const ym = dm.toISOString().slice(0,7);
    return iso => (iso||'').startsWith(ym);
  }
  if(finPeriodo==='ano'){
    const y = hoje.slice(0,4);
    return iso => (iso||'').startsWith(y);
  }
  return iso => true; // tudo
}
function renderFinanceiro(){
  const el = document.getElementById('view-financeiro');
  const inRange = periodRange();
  el.innerHTML = `
    ${renderMeiCard()}
    <div class="toolbar">
      <div class="subtabs">
        <button class="subtab-btn ${finSubtab==='faturamento'?'active':''}" onclick="finSubtab='faturamento'; renderFinanceiro()">Faturamento</button>
        <button class="subtab-btn ${finSubtab==='gastos'?'active':''}" onclick="finSubtab='gastos'; renderFinanceiro()">Gastos</button>
        <button class="subtab-btn ${finSubtab==='resumo'?'active':''}" onclick="finSubtab='resumo'; renderFinanceiro()">Resumo</button>

      <select class="period-select" onchange="finPeriodo=this.value; renderFinanceiro()">
        <option value="mes" ${finPeriodo==='mes'?'selected':''}>Este mês</option>
        <option value="mespassado" ${finPeriodo==='mespassado'?'selected':''}>Mês passado</option>
        <option value="ano" ${finPeriodo==='ano'?'selected':''}>Este ano</option>
        <option value="tudo" ${finPeriodo==='tudo'?'selected':''}>Tudo</option>
      </select>
    </div>
    <div id="finBody"></div>
  `;
  const body = document.getElementById('finBody');
  if(finSubtab==='faturamento') body.innerHTML = renderFaturamento(inRange);
  if(finSubtab==='gastos') body.innerHTML = renderGastos(inRange);
  if(finSubtab==='resumo') body.innerHTML = renderResumo(inRange);
  animateStatCards(body);
  animateProgressBars(el);
}

function renderResumo(inRange){
  const fechados = state.clientes.filter(c=>c.status==='fechado' && inRange(c.dataFechamento));
  const faturamento = fechados.reduce((s,c)=>s+Number(c.valorPacote||0),0);
  const comissaoPrevista = fechados.reduce((s,c)=>s+Number(c.valorComissao||0),0);
  const comissaoRecebida = fechados.filter(c=>c.comissaoRecebida).reduce((s,c)=>s+Number(c.valorComissao||0),0);
  const comissaoPendente = comissaoPrevista - comissaoRecebida;
  const gastos = state.gastos.filter(g=>inRange(g.data)).reduce((s,g)=>s+Number(g.valor||0),0);
  const saldo = comissaoRecebida - gastos;
  const totalLeads = state.clientes.filter(c=>inRange(c.dataCriacao)).length;
  const conversao = totalLeads>0 ? Math.round((fechados.length/totalLeads)*100) : 0;
  return `
    <div class="stat-grid" style="margin-top:14px">

      <div class="stat-card warn"><div class="label">Gastos totais</div><div class="value" data-count="${gastos}" data-currency="1">R$ 0,00</div></div>
      <div class="stat-card ${saldo>=0?'good':''}"><div class="label">Saldo (comissão recebida - gastos)</div><div class="value" data-count="${saldo}" data-currency="1">R$ 0,00</div></div>
      <div class="stat-card"><div class="label">Novos leads</div><div class="value" data-count="${totalLeads}">0</div></div>
      <div class="stat-card"><div class="label">Taxa de conversão</div><div class="value" data-count="${conversao}" data-suffix="%">0%</div></div>
    </div>
    <p class="muted" style="margin-top:14px;font-size:12px">Saldo é uma estimativa simples (comissão já recebida menos gastos do período) — não considera impostos ou outras despesas fixas.</p>
  `;
}

/* ============================================================
   CALENDÁRIO
   ============================================================ */
let calSelectedDay = null;
function renderCalendario(){
  const el = document.getElementById('view-calendario');
  const {year, month} = calView;
  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const hoje = todayISO();

  let cells = [];
  for(let i=startDow-1;i>=0;i--) cells.push({d: daysInPrevMonth-i, other:true, iso:null});
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({d, other:false, iso});
  }
  while(cells.length % 7 !== 0) cells.push({d: cells.length, other:true, iso:null});

  function tripsOnDay(iso){
    if(!iso) return [];
    return state.clientes.filter(c=>{
      if(c.status!=='fechado' || !c.dataViagemIda) return false;
      const fim = c.dataViagemVolta || c.dataViagemIda;
      return c.dataViagemIda <= iso && iso <= fim;
    });
  }
  function renderCalCell(cell){
    if(!cell.iso){
      return `<div class="cal-cell other"><div class="cal-top-row"><span class="dnum">${cell.d}</span></div></div>`;
    }
    const infos = tripsOnDay(cell.iso).map(t=>Object.assign({c:t}, tripStatusInfo(t)));
    const hasAlert = infos.some(i=>i.pend>0);
    const worst = infos.some(i=>i.color==='red') ? 'red' : (infos.some(i=>i.color==='amber') ? 'amber' : (infos.length ? 'green' : ''));
    const tintClass = worst ? ('tint-'+worst) : '';
    const shown = infos.slice(0,2);
    const extra = infos.length - shown.length;
    const barsHtml = shown.map(i=>{
      const fim = i.c.dataViagemVolta || i.c.dataViagemIda;
      const isStart = i.c.dataViagemIda === cell.iso;
      const isEnd = fim === cell.iso;
      return `<div class="cal-bar ${i.color}${isStart?' rounded-l':''}${isEnd?' rounded-r':''}"></div>`;
    }).join('') + (extra>0 ? `<div class="cal-more">+${extra} mais</div>` : '');
    return `<div class="cal-cell ${cell.other?'other':''} ${cell.iso===hoje?'today':''} ${tintClass}" onclick="selectCalDay('${cell.iso}')">
      <div class="cal-top-row">
        <div class="cal-dnum-wrap">
          <span class="dnum">${cell.d}</span>
          ${hasAlert?'<span class="cal-alert-dot" title="Tem pendência de assistência"></span>':''}
        </div>
        ${infos.length? `<span class="cal-count-badge">✈️ ${infos.length}</span>` : ''}
      </div>
      ${infos.length? `<div class="cal-bars">${barsHtml}</div>` : '<div></div>'}
    </div>`;
  }

  el.innerHTML = `
    <div class="cal-head">
      <button class="btn sm" onclick="calShift(-1)">← Anterior</button>
      <h2 style="font-size:15px;color:var(--primary-dark)">${monthNames[month]} de ${year}</h2>
      <button class="btn sm" onclick="calShift(1)">Próximo →</button>
    </div>
    <div class="cal-legend">
      <div class="item"><span class="sw" style="background:var(--success)"></span>Tudo confirmado</div>
      <div class="item"><span class="sw" style="background:var(--warn)"></span>Falta confirmar</div>
      <div class="item"><span class="sw" style="background:var(--danger)"></span>Urgente (≤2 dias) e pendente</div>
    </div>
    <div class="cal-grid">
      ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells.map(c=>renderCalCell(c)).join('')}
    </div>
    <div class="day-detail" id="dayDetail">
      ${calSelectedDay ? renderDayDetail(calSelectedDay, tripsOnDay(calSelectedDay)) : `<div class="empty-state">Toque em um dia para ver as viagens marcadas.</div>`}
    </div>
  `;
}
function calShift(delta){
  let m = calView.month + delta;
  let y = calView.year;
  if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
  calView = {year:y, month:m};
  renderCalendario();
}
function selectCalDay(iso){
  calSelectedDay = iso;
  renderCalendario();
}
function renderDayDetail(iso, trips){
  return `
    <div class="section-title"><h2>Viagens em ${fmtData(iso)} <span class="count">${trips.length}</span></h2></div>
    ${trips.length===0? emptyState('Nenhuma viagem nesse dia.') : trips.map(c=>{
      const info = tripStatusInfo(c);
      return `<div class="alert-item">
        <div class="dot ${info.color}"></div>
        <div class="body">
          <div class="t1">${esc(c.nome)} · ${esc(c.destino||'—')}</div>
          <div class="t2">${fmtData(c.dataViagemIda)} → ${fmtData(c.dataViagemVolta)} ${info.pend>0? `· ${info.pend} pendência(s)`:'· tudo confirmado'}</div>
        </div>
        <button class="pill ${info.color}" style="border:none" onclick="openClientModal('${c.id}')">Ver</button>
      </div>`;
    }).join('')}
  `;
}

/* ============================================================
   BACKUP
   ============================================================ */
function exportBackup(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `primeway-backup-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importBackup(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!data.clientes || !data.gastos) throw new Error('Arquivo inválido');
      if(!(await askConfirm('Isso vai SUBSTITUIR todos os dados atuais pelo conteúdo do backup. Continuar?'))) return;
      state = data;
      saveState();
      render();
      toast('Backup importado com sucesso.', 'success');
    }catch(err){
      toast('Não foi possível importar esse arquivo. Verifique se é um backup válido.', 'error');
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

/* ============================================================
   SINCRONIZAÇÃO NA NUVEM (Google Sheets via Apps Script)
   ============================================================ */
const SYNC_URL_KEY = 'primeway_sync_url';
const SYNC_AUTO_KEY = 'primeway_sync_auto';
let syncTimer = null;
let syncInFlight = false;

function getSyncUrl(){ return localStorage.getItem(SYNC_URL_KEY) || ''; }
function setSyncUrl(url){ localStorage.setItem(SYNC_URL_KEY, url.trim()); }
function getSyncAuto(){ return localStorage.getItem(SYNC_AUTO_KEY) !== 'false'; }
function setSyncAuto(v){ localStorage.setItem(SYNC_AUTO_KEY, v ? 'true':'false'); }

function setSyncStatus(text, tone){
  const bar = document.getElementById('syncStatusBar');
  if(!bar) return;
  const colors = { ok:'var(--success)', warn:'var(--warn)', err:'var(--danger)', muted:'var(--text-muted)' };
  bar.innerHTML = `<span style="color:${colors[tone]||colors.muted}">☁️ ${text}</span>`;
}

function scheduleSync(){
  if(!getSyncUrl() || !getSyncAuto()) return;
  clearTimeout(syncTimer);
  setSyncStatus('Alterações pendentes de envio...', 'warn');
  syncTimer = setTimeout(syncPush, 2500);
}

function syncPush(callback){
  const url = getSyncUrl();
  if(!url){ if(callback) callback(false); return; }
  syncInFlight = true;
  setSyncStatus('Enviando para a nuvem...', 'warn');
  const payload = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  fetch(url + '?action=save&data=' + encodeURIComponent(payload))
    .then(r=>r.json())
    .then(res=>{
      syncInFlight = false;
      if(res && res.status==='ok'){
        setSyncStatus('Sincronizado às ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}), 'ok');
        if(callback) callback(true);
      } else {
        setSyncStatus('Erro ao sincronizar. Confira a URL do sincronizador.', 'err');
        if(callback) callback(false);
      }
    })
    .catch(()=>{
      syncInFlight = false;
      setSyncStatus('Sem conexão com a nuvem. Dados salvos só neste aparelho por enquanto.', 'err');
      if(callback) callback(false);
    });
}

function syncPull(callback){
  const url = getSyncUrl();
  if(!url){ if(callback) callback(false); return; }
  setSyncStatus('Carregando da nuvem...', 'warn');
  fetch(url + '?action=load')
    .then(r=>r.json())
    .then(res=>{
      if(res && res.status==='ok' && res.data){
        try{
          const parsed = JSON.parse(res.data);
          if(parsed && parsed.clientes){
            state = parsed;
            if(!state.gastos) state.gastos = [];
            if(!state.cotacoes) state.cotacoes = [];
            if(!state.config) state.config = { limiteMeiAnual: 81000 };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            setSyncStatus('Dados atualizados da nuvem agora', 'ok');
            render();
            if(callback) callback(true);
            return;
          }
        }catch(e){}
      }
      setSyncStatus('Nuvem vazia ainda — nada para carregar', 'muted');
      if(callback) callback(false);
    })
    .catch(()=>{
      setSyncStatus('Sem conexão com a nuvem. Mostrando dados salvos neste aparelho.', 'err');
      if(callback) callback(false);
    });
}

function openSyncModal(){
  const url = getSyncUrl();
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-head"><h3>☁️ Sincronização na nuvem</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <p class="muted" style="font-size:12.5px;line-height:1.5">
      Cole aqui o link do Web App do Google Apps Script (veja o passo a passo que te enviei em texto). Com isso, o mesmo cadastro fica disponível no notebook, tablet e celular.
    </p>
    <div class="form-grid">
      <div class="field full"><label>URL do Web App</label><input id="sync_url" placeholder="https://script.google.com/macros/s/..." value="${esc(url)}"></div>
      <div class="field full">
        <div class="check-row"><input type="checkbox" class="chk" id="sync_auto" ${getSyncAuto()?'checked':''}><label style="margin:0" for="sync_auto">Sincronizar automaticamente após cada alteração</label></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Fechar</button>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="manualPull()">Carregar da nuvem</button>
        <button class="btn" onclick="manualPush()">Salvar na nuvem agora</button>
        <button class="btn primary" onclick="saveSyncSettings()">Salvar link</button>
      </div>
    </div>
  `;
  showModal();
}
function saveSyncSettings(){
  const url = document.getElementById('sync_url').value.trim();
  setSyncUrl(url);
  setSyncAuto(document.getElementById('sync_auto').checked);
  closeModal();
  if(url) syncPull();
}
function manualPush(){ syncPush(ok=>{ toast(ok ? 'Dados salvos na nuvem.' : 'Não consegui salvar na nuvem. Confira a URL e sua conexão.', ok?'success':'error'); }); }
async function manualPull(){
  if(!(await askConfirm('Isso vai SUBSTITUIR os dados deste aparelho pelos dados salvos na nuvem. Continuar?'))) return;
  syncPull(ok=>{ toast(ok ? 'Dados atualizados a partir da nuvem.' : 'Não encontrei dados na nuvem ainda, ou houve erro de conexão.', ok?'success':'error'); });
}

/* ============================================================
   INIT
   ============================================================ */
switchTab('dashboard');
if(getSyncUrl()){ syncPull(); } else { setSyncStatus('Sincronização na nuvem desligada — toque em ☁️ para configurar', 'muted'); }
</script>
